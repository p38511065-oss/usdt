<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="rebuild-ui.css" />
</head>
<body data-page="admin-login">
  <header class="topbar">
    <div class="container nav">
      <div class="brand">₹ Crypto Sell to INR Desk Admin</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Seller Login</a>
      </nav>
    </div>
  </header>

  <main class="auth-rebuild-shell">
    <section class="auth-rebuild-copy">
      <span class="neo-chip">ADMIN CONTROL CENTER</span>
      <h1>Secure admin access for <span>OTC operations</span></h1>
      <p>Manage rate slabs, wallets, QR codes, KYC, payout destinations, order statuses and admin actions in one premium control panel.</p>
      <div class="neo-badges">
        <span>Orders & Payouts</span><span>Wallet Management</span><span>KYC Review</span>
      </div>
    </section>

    <section class="card auth-glow-card">
      <div class="auth-icon">₹</div>
      <div class="form-group"><label>Email</label><input id="admin-email" type="email" placeholder="Enter admin email" /></div>
      <div class="form-group"><label>Password</label><input id="admin-password" type="password" placeholder="Enter password" /></div>
      <button id="admin-login-btn" class="btn btn-primary btn-block">Login to Admin Panel</button>
      <p id="admin-auth-message" class="status-text"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="main.js"></script>
</body>
</html>
