<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Crypto Sell to INR Desk</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login">
  <header class="topbar">
    <div class="container nav">
      <div class="brand">₹ Crypto Sell to INR Desk</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="admin-login.html">Admin Login</a>
      </nav>
    </div>
  </header>
  <main class="container auth-layout">
    <section>
      <span class="eyebrow">Secure access</span>
      <h1>Seller Login & Register</h1>
      <p class="lead">Access sell quotes, orders, payouts and referrals.</p>
      <div class="badges">
        <span>Secure Login</span>
        <span>KYC Ready</span>
        <span>Referral Code Support</span>
      </div>
    </section>
    <section class="card glass auth-card">
      <div class="tabs">
        <button class="tab active" data-target="login-panel">Login</button>
        <button class="tab" data-target="register-panel">Register</button>
      </div>

      <div id="login-panel" class="tab-panel active">
        <div class="form-group">
          <label>Email</label>
          <input id="login-email" type="email" placeholder="Enter email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="login-password" type="password" placeholder="Enter password" />
        </div>
        <button id="login-btn" class="btn btn-primary btn-block">Login to Dashboard</button>
      </div>

      <div id="register-panel" class="tab-panel">
        <div class="form-group">
          <label>Full Name</label>
          <input id="register-name" type="text" placeholder="Enter full name" />
        </div>
        <div class="form-group">
          <label>Mobile</label>
          <input id="register-mobile" type="text" placeholder="Enter mobile number" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="register-email" type="email" placeholder="Enter email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="register-password" type="password" placeholder="Create password" />
        </div>
        <div class="form-group">
          <label>Referral Code (Optional)</label>
          <input id="register-referral" type="text" placeholder="Enter referral code" />
        </div>
        <button id="register-btn" class="btn btn-primary btn-block">Create Account</button>
      </div>

      <p id="auth-message" class="status-text"></p>
      <p class="tiny-note">Seller login is here. Admins should use the separate <a href="admin-login.html">Admin Login</a> page.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="main.js"></script>
</body>
</html>
