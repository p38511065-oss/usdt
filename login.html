<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="rebuild-ui.css" />
</head>
<body data-page="login">
  <header class="topbar">
    <div class="container nav">
      <div class="brand">₹ Crypto Sell to INR Desk</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Seller Login</a>
      </nav>
    </div>
  </header>

  <main class="auth-rebuild-shell">
    <section class="auth-rebuild-copy">
      <span class="neo-chip">SELLER ACCESS</span>
      <h1>Manage quotes, orders and <span>INR payouts</span></h1>
      <p>Login to view available USDT/INR slabs, create sell requests, submit TX hash, manage payout methods and track your order status.</p>
      <div class="neo-badges">
        <span>Secure Login</span><span>KYC Ready</span><span>Wallet QR Flow</span>
      </div>
    </section>

    <section class="card auth-glow-card">
      <div class="auth-icon">₮</div>
      <div class="tabs">
        <button class="tab active" data-target="login-panel">Login</button>
        <button class="tab" data-target="register-panel">Register</button>
      </div>

      <div id="login-panel" class="tab-panel active">
        <div class="form-group"><label>Email</label><input id="login-email" type="email" placeholder="Enter email" /></div>
        <div class="form-group"><label>Password</label><input id="login-password" type="password" placeholder="Enter password" /></div>
        <button id="login-btn" class="btn btn-primary btn-block">Login to Seller Dashboard</button>
      </div>

      <div id="register-panel" class="tab-panel">
        <div class="form-group"><label>Full Name</label><input id="register-name" placeholder="Enter full name" /></div>
        <div class="form-group"><label>Mobile</label><input id="register-mobile" placeholder="Enter mobile number" /></div>
        <div class="form-group"><label>Email</label><input id="register-email" type="email" placeholder="Enter email" /></div>
        <div class="form-group"><label>Password</label><input id="register-password" type="password" placeholder="Create password" /></div>
        <div class="form-group"><label>Referral Code (optional)</label><input id="register-referral" placeholder="Enter referral code" /></div>
        <button id="register-btn" class="btn btn-primary btn-block">Create Seller Account</button>
      </div>
      <p id="auth-message" class="status-text"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="main.js"></script>
</body>
</html>
